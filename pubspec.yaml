# =============================================================================
# pubspec.yaml - TogetherSafe App Configuration
# =============================================================================
# This file defines the app metadata and dependencies for the TogetherSafe
# disaster preparedness mobile application.
#
# Author: [Student Name]
# Module: CM3050 Mobile Development
# Project: TogetherSafe - Disaster Preparedness App
# =============================================================================

name: togethersafe
description: A gamified disaster preparedness app for Singapore residents.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: "^3.7.0"

# =============================================================================
# DEPENDENCIES
# =============================================================================
# Only including packages that are actually used in the project.

dependencies:
  flutter:
    sdk: flutter

  # Database - SQLite for local data storage
  # Used in: db.dart (storing user profile, tasks, badges, reports)
  sqflite: ^2.4.2
  path: ^1.9.1

  # Networking - HTTP requests for API calls
  # Used in: api_service.dart (fetching data from data.gov.sg)
  http: ^1.3.0

  # Local Storage - For session management
  # Used in: loginpage.dart, signuppage.dart (storing login state)
  shared_preferences: ^2.5.2

  # Image Picker - For flood report photos
  # Used in: reportpage.dart (camera/gallery access)
  image_picker: ^1.1.2

  # URL Launcher - For making phone calls
  # Used in: emergencyhomepage.dart (calling 995 emergency)
  url_launcher: ^6.3.1

  # Cupertino Icons - iOS style icons
  cupertino_icons: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # App icon generator - only needed during build
  flutter_launcher_icons: ^0.13.1

# =============================================================================
# FLUTTER CONFIGURATION
# =============================================================================

flutter:
  uses-material-design: true

  # Assets (update these paths based on your actual asset structure)
  # assets:
  #   - assets/
  #   - assets/images/
  #   - assets/icon/

# =============================================================================
# APP ICON CONFIGURATION
# =============================================================================
# Run: flutter pub run flutter_launcher_icons

flutter_launcher_icons:
  image_path: "assets/icon/icon.png"
  android: true
  min_sdk_android: 21
  ios: true
  remove_alpha_channel_ios: true
  adaptive_icon_background: "#1B263B"
  adaptive_icon_foreground: "assets/icon/icon.png"